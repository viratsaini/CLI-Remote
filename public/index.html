<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Copilot CLI Remote</title>
  <link rel="stylesheet" href="/vendor/xterm.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/terminal.css" />
</head>
<body class="app-page">

  <!-- Top Navigation Bar -->
  <nav class="navbar">
    <button class="nav-btn hamburger" id="sidebar-toggle" aria-label="Toggle sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="nav-title">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right:8px;flex-shrink:0">
        <circle cx="12" cy="12" r="11" stroke="#58a6ff" stroke-width="1.5"/>
        <circle cx="9" cy="10" r="2" fill="#58a6ff"/>
        <circle cx="15" cy="10" r="2" fill="#58a6ff"/>
        <path d="M8 15.5c1-1.5 7-1.5 8 0" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Copilot CLI Remote
    </div>
    <div class="nav-right">
      <div class="status-indicator" id="status-indicator" title="Disconnected">
        <span class="status-dot" id="status-dot"></span>
      </div>
      <button class="nav-btn user-menu-btn" id="user-menu-btn" aria-label="User menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- User dropdown menu -->
  <div class="user-dropdown" id="user-dropdown" style="display:none;">
    <div class="user-info" id="user-info-text">Loading...</div>
    <hr class="dropdown-divider"/>
    <button class="dropdown-item" id="logout-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sign Out
    </button>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- App layout -->
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Sessions</span>
        <button class="btn btn-sm btn-primary" id="new-session-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New
        </button>
      </div>
      <div class="session-list" id="session-list">
        <div class="session-empty" id="session-empty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <polyline points="9 9 12 12 15 9"/>
            <line x1="12" y1="12" x2="12" y2="15"/>
          </svg>
          <p>No sessions yet</p>
          <button class="btn btn-sm btn-primary" onclick="document.getElementById('new-session-btn').click()">Create one</button>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content" id="main-content">
      <!-- Tab bar -->
      <div class="tab-bar" id="tab-bar"></div>

      <!-- Terminal area -->
      <div class="terminal-area" id="terminal-area">
        <div class="terminal-welcome" id="terminal-welcome">
          <div class="welcome-content">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.6">
              <polyline points="4 17 10 11 4 5"/>
              <line x1="12" y1="19" x2="20" y2="19"/>
            </svg>
            <h2>Welcome to Copilot CLI Remote</h2>
            <p>Create a new terminal session to get started</p>
            <button class="btn btn-primary" onclick="document.getElementById('new-session-btn').click()">
              + New Session
            </button>
          </div>
        </div>
      </div>

      <!-- Bottom toolbar (mobile) -->
      <div class="bottom-toolbar" id="bottom-toolbar">
        <button class="tool-btn" id="keyboard-toggle-btn" title="Toggle keyboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="6" width="20" height="12" rx="2"/>
            <line x1="6" y1="10" x2="6" y2="10" stroke-width="3" stroke-linecap="round"/>
            <line x1="10" y1="10" x2="10" y2="10" stroke-width="3" stroke-linecap="round"/>
            <line x1="14" y1="10" x2="14" y2="10" stroke-width="3" stroke-linecap="round"/>
            <line x1="18" y1="10" x2="18" y2="10" stroke-width="3" stroke-linecap="round"/>
            <line x1="8" y1="14" x2="16" y2="14" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="tool-btn" id="suggestions-btn" title="Copilot suggestions">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
            <circle cx="9" cy="10" r="1.5" fill="currentColor"/>
            <circle cx="15" cy="10" r="1.5" fill="currentColor"/>
            <path d="M8.5 15c1-1.2 6-1.2 7 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="tool-btn" id="fullscreen-btn" title="Fullscreen">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 3 21 3 21 9"/>
            <polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/>
            <line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
        <div class="toolbar-input-wrap">
          <input type="text" id="quick-input" class="quick-input" placeholder="Quick command..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
          <button class="tool-btn send-btn" id="send-btn" title="Send">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- New Session Modal -->
  <div class="modal-overlay" id="new-session-modal" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">New Terminal Session</h3>
        <button class="modal-close" id="modal-close-btn" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="session-name">Session Name</label>
          <input type="text" id="session-name" placeholder="My Terminal" autocomplete="off" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="session-cols">Columns</label>
            <input type="number" id="session-cols" value="80" min="40" max="220" />
          </div>
          <div class="form-group">
            <label for="session-rows">Rows</label>
            <input type="number" id="session-rows" value="24" min="10" max="80" />
          </div>
        </div>
        <div class="form-group">
          <label for="session-shell">Shell (optional)</label>
          <input type="text" id="session-shell" placeholder="Default system shell" autocomplete="off" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel-btn">Cancel</button>
        <button class="btn btn-primary" id="modal-create-btn">Create Session</button>
      </div>
    </div>
  </div>

  <!-- Suggestions Panel -->
  <div class="suggestions-panel" id="suggestions-panel">
    <div class="suggestions-header">
      <div class="suggestions-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right:6px">
          <circle cx="12" cy="12" r="10" stroke="#58a6ff" stroke-width="2"/>
          <circle cx="9" cy="10" r="1.5" fill="#58a6ff"/>
          <circle cx="15" cy="10" r="1.5" fill="#58a6ff"/>
          <path d="M8.5 15c1-1.2 6-1.2 7 0" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Copilot Suggestions
      </div>
      <button class="suggestions-close" id="suggestions-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="suggestions-search">
      <input type="text" id="suggestions-input" placeholder="Describe what you want to do..." class="suggestions-query" autocomplete="off" autocorrect="off" autocapitalize="off" />
      <button class="btn btn-primary btn-sm" id="suggestions-search-btn">Ask</button>
    </div>
    <div class="suggestions-result" id="suggestions-result">
      <p class="suggestions-hint">Ask Copilot to suggest a command, e.g. "list all files modified today"</p>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts (served locally – no CDN dependency) -->
  <script src="/vendor/xterm.js"></script>
  <script src="/vendor/xterm-addon-fit.js"></script>
  <script src="/vendor/xterm-addon-web-links.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ws.js"></script>
  <script src="/js/terminal.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
