<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Copilot CLI Remote – Login</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="11" stroke="#58a6ff" stroke-width="1.5"/>
          <circle cx="9" cy="10" r="2" fill="#58a6ff"/>
          <circle cx="15" cy="10" r="2" fill="#58a6ff"/>
          <path d="M8 15.5c1-1.5 7-1.5 8 0" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M6 8c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="login-title">Copilot CLI Remote</h1>
      <p class="login-subtitle">Control your terminal from anywhere</p>

      <div id="login-error" class="error-message" style="display:none;"></div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            placeholder="admin"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
          />
        </div>
        <div class="form-group checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-me" name="remember-me" />
            <span>Remember me</span>
          </label>
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary btn-full">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner" style="display:none;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          </span>
        </button>
      </form>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    (function () {
      // Redirect if already logged in
      if (window.auth && window.auth.isAuthenticated()) {
        window.location.replace('/');
        return;
      }

      const form = document.getElementById('login-form');
      const errorDiv = document.getElementById('login-error');
      const loginBtn = document.getElementById('login-btn');
      const btnText = loginBtn.querySelector('.btn-text');
      const btnSpinner = loginBtn.querySelector('.btn-spinner');

      function setLoading(loading) {
        loginBtn.disabled = loading;
        btnText.style.display = loading ? 'none' : 'inline';
        btnSpinner.style.display = loading ? 'inline-flex' : 'none';
        if (loading) btnSpinner.classList.add('spinning');
        else btnSpinner.classList.remove('spinning');
      }

      function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorDiv.style.display = 'none';
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if (!username || !password) return showError('Username and password are required');
        setLoading(true);
        try {
          await window.auth.login(username, password);
          window.location.replace('/');
        } catch (err) {
          showError(err.message || 'Login failed. Check your credentials.');
          setLoading(false);
        }
      });
    })();
  </script>
</body>
</html>
